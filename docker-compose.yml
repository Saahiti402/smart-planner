x-backend-base: &backend-base
  build:
    context: .
    dockerfile: Dockerfile
    target: backend
  image: smart-planner-backend:local
  restart: unless-stopped

x-frontend-base: &frontend-base
  build:
    context: .
    dockerfile: Dockerfile
    target: frontend
  image: smart-planner-frontend:local
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_travel
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d smart_travel"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    <<: *backend-base
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://planner:planner123@db:5432/smart_travel
      HF_HOME: /app/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - hf_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    <<: *frontend-base
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      BACKEND_BASE_URL: http://backend:8000
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_SERVER_HEADLESS: "true"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  hf_cache:
